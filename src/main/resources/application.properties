# ===================================================================
# Core Application Configurations
# ===================================================================
spring.application.name=online_portfolio_website
server.port=8081

# ===================================================================
# Actuator Management Configurations (Required for Metrics Routing)
# ===================================================================
# Port matching containerPort & NodePort routing in your service.yaml
management.server.port=9090

# Expose endpoints (health, metrics, graphite, info) over HTTP
management.endpoints.web.exposure.include=*

# Explicitly expose health & metrics checks
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true

# ===================================================================
# Graphite Exporter Configurations
# ===================================================================
# Enable Graphite metrics exporting
management.graphite.metrics.export.enabled=true

# Hostname matching your docker container_name exactly
management.graphite.metrics.export.host=graphite
management.graphite.metrics.export.port=2003

# How often data should be pushed to Graphite
management.graphite.metrics.export.step=10s

# CRITICAL FIXES FOR "__tagged" ERROR:
# Forces traditional dot-separated directory structures (e.g., apps.portfolio.jvm.memory)
management.graphite.metrics.export.graphite-tags-compatible=false
management.graphite.metrics.export.protocol=plaintext